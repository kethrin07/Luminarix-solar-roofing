      .sun-ray { stroke: #ff7e2f; stroke-width: 2.5; stroke-linecap: round; }
      .energy-dot { fill: #ff7e2f; }
      .wire { fill: none; stroke: #ff7e2f; stroke-width: 1.8; stroke-dasharray: 6,4; stroke-linecap: round; opacity: 0.7; }
      .glow { fill: #86b7cc; opacity: 0.12; }
    </style>
